<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Vocabulary Review</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>Vocabulary Review</h1>
        <p id="summary">Loading vocabulary API</p>
      </div>
      <div class="filters">
        <input id="search" type="search" placeholder="Search words, meanings, examples">
        <select id="status">
          <option value="">All statuses</option>
          <option value="draft">Draft</option>
          <option value="approved">Approved</option>
          <option value="rejected">Rejected</option>
        </select>
      </div>
    </header>

    <nav class="tabs" role="tablist" aria-label="View switcher">
      <button id="tab-cards" class="tab" role="tab" type="button" aria-selected="true" aria-controls="word-list">Cards</button>
      <button id="tab-table" class="tab" role="tab" type="button" aria-selected="false" aria-controls="word-table">Table</button>
    </nav>

    <main>
      <section id="word-list" class="word-list" role="tabpanel" aria-labelledby="tab-cards" aria-live="polite"></section>
      <section id="word-table" class="word-table-wrapper" role="tabpanel" aria-labelledby="tab-table" aria-live="polite" hidden></section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
