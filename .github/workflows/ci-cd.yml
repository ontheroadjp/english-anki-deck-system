name: CI/CD

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Backend tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend test dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[test]'

      - name: Run backend tests
        working-directory: backend
        run: pytest

  deploy:
    name: Deploy backend API
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          install -m 600 /dev/null ~/.ssh/deploy_key
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy and restart service
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" \
            "set -eu
             cd \"$DEPLOY_PATH\"
             if [ ! -d english/.git ]; then
               backup_dir=
               if [ -e english ]; then
                 backup_dir=\"english.preclone.$(date +%s)\"
                 mv english \"$backup_dir\"
               fi
               git clone git@github:ontheroadjp/english-anki-deck-system english
               if [ -n \"${backup_dir:-}\" ] && [ -f \"$backup_dir/.env\" ]; then
                 mv \"$backup_dir/.env\" english/.env
               fi
             fi
             cd english
             git pull --ff-only
             python3 -m pip install --user -e backend
             sudo systemctl restart dict-english"
