name: CI/CD

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Backend tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend test dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[test]'

      - name: Run backend tests
        working-directory: backend
        run: pytest

  build:
    name: Build deploy payload
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Build vocabulary.db from Anki TSV
        working-directory: backend
        run: |
          python -m vocabdb init-db --db vocabulary.db
          python -m vocabdb import-anki anki_csv/target_1900_6th.txt --db vocabulary.db

      - name: Stage slim deploy payload
        run: |
          mkdir -p payload/backend
          cp -r backend/vocabdb payload/backend/
          cp backend/pyproject.toml payload/backend/
          cp backend/vocabulary.db payload/backend/
          find payload -type d -name '__pycache__' -exec rm -rf {} +

      - name: Upload payload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deploy-payload
          path: payload/
          retention-days: 1
          if-no-files-found: error

  deploy:
    name: Deploy backend API
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Download payload artifact
        uses: actions/download-artifact@v4
        with:
          name: deploy-payload
          path: payload/

      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          install -m 600 /dev/null ~/.ssh/deploy_key
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Rsync payload to host
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          rsync -avz --delete \
            --exclude='.env' \
            --exclude='.venv/' \
            --exclude='server/' \
            --exclude='backend/*.egg-info/' \
            -e "ssh -i ~/.ssh/deploy_key" \
            payload/ "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/"

      - name: Bootstrap venv and restart service
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" \
            "set -eu
             cd \"$DEPLOY_PATH\"
             if [ ! -d .venv ]; then python3 -m venv .venv; fi
             .venv/bin/pip install --upgrade pip
             .venv/bin/pip install -e backend
             sudo systemctl restart dict-english"
